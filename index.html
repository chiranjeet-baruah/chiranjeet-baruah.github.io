<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chiranjeet Baruah — Backend Engineer</title>
  <style>
    /* ── EASY CUSTOMIZATION: edit these variables ── */
    :root {
      --bg:      #0d1117;
      --surface: #161b22;
      --border:  #21262d;
      --accent:  #00d4aa;
      --text:    #e6edf3;
      --muted:   #8b949e;
      --radius:  8px;
      --nav-h:   60px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      scroll-behavior: smooth;
      font-size: 16px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
      line-height: 1.6;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    section { scroll-margin-top: var(--nav-h); }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--nav-h);
      background: rgba(13, 17, 23, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      z-index: 100;
    }

    .nav-logo {
      font-weight: 700;
      font-size: 1rem;
      color: var(--text);
      letter-spacing: 0.02em;
    }

    .nav-links {
      display: flex;
      gap: 1.5rem;
      list-style: none;
    }

    .nav-links a {
      color: var(--muted);
      font-size: 0.875rem;
      transition: color 0.2s;
    }

    .nav-links a:hover,
    .nav-links a.active {
      color: var(--accent);
      text-decoration: none;
    }

    /* ── LAYOUT ── */
    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 0 1.5rem;
    }
  </style>
</head>
<body>

  <nav>
    <span class="nav-logo">CB</span>
    <ul class="nav-links">
      <li><a href="#about">About</a></li>
      <li><a href="#experience">Experience</a></li>
      <li><a href="#skills">Skills</a></li>
      <li><a href="#education">Education</a></li>
      <li><a href="#contact">Contact</a></li>
      <li><a href="https://github.com/chiranjeet-baruah" target="_blank" rel="noopener">GitHub ↗</a></li>
    </ul>
  </nav>

  <main>
    <!-- sections go here -->
  </main>

  <script>
    // Active nav link on scroll — edit nothing here
    const sections = document.querySelectorAll('section[id]');
    const navLinks = document.querySelectorAll('.nav-links a[href^="#"]');
    const observer = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          navLinks.forEach(a => a.classList.remove('active'));
          const active = document.querySelector(`.nav-links a[href="#${entry.target.id}"]`);
          if (active) active.classList.add('active');
        }
      });
    }, { rootMargin: '-40% 0px -55% 0px' });
    sections.forEach(s => observer.observe(s));
  </script>

</body>
</html>
